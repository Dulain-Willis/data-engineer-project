version: 2

models:
  - name: int_steamspy_developers
    description: >
      Deduplicated developer dimension table. Splits the comma-separated developer
      field from silver_stg_games into individual developer names, preserving
      business-name suffixes (LLC, Inc., Ltd., Co., Corp.).
    columns:
      - name: developer_id
        description: Surrogate key assigned by row number at materialisation time.
      - name: developer
        description: Individual developer name, trimmed and deduplicated.
      - name: dt
        description: Partition date inherited from the source staging table.

  - name: int_steamspy_publishers
    description: >
      Deduplicated publisher dimension table. Splits the comma-separated publisher
      field from silver_stg_games into individual publisher names, preserving
      business-name suffixes (LLC, Inc., Ltd., Co., Corp.).
    columns:
      - name: publisher_id
        description: Surrogate key assigned by row number at materialisation time.
      - name: publisher
        description: Individual publisher name, trimmed and deduplicated.
      - name: dt
        description: Partition date inherited from the source staging table.
