version: 2

models:
  - name: gold_game_title_word_cloud
    description: >
      Word frequency count across all game titles, suitable for word cloud visualisations.
      Non-letter characters are stripped, titles are split into individual words,
      and each word is counted across all games.
    columns:
      - name: word
        description: A single word extracted from a game title.
      - name: word_count
        description: Number of times this word appears across all game titles.

  - name: gold_top_games_ranked
    description: >
      Top 50 Steam games ranked by raw positive review count, gated by Wilson score quality.
      Only the top 500 games by Wilson score (95% CI lower bound) are eligible,
      then ranked by absolute positive review volume within that pool.
      Rewards games that are both genuinely well-received and widely played.
    columns:
      - name: rank
        description: Position 1–50, ordered by positive review count descending within the Wilson pool.
      - name: game_title
        description: Steam game title.
      - name: total_reviews
        description: Total user reviews (positive + negative).
      - name: positive
        description: Count of positive user reviews.
      - name: negative
        description: Count of negative user reviews.
      - name: approval_pct
        description: Percentage of reviews that are positive.
      - name: wilson_score
        description: Wilson score lower bound (used as the quality gate, not for final ranking).
